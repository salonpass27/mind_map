<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>心智圖生成系統</title>
    <style>
        /* --- 完全保留原始樣式 --- */
        :root { --primary: #2c3e50; --accent: #e67e22; --line: #bdc3c7; }
        body { margin: 0; font-family: "Microsoft JhengHei", sans-serif; display: flex; height: 100vh; background: #f5f6fa; overflow: hidden; }
        
        .sidebar { width: 320px; background: white; border-right: 1px solid #ddd; display: flex; flex-direction: column; padding: 15px; box-shadow: 2px 0 10px rgba(0,0,0,0.1); z-index: 100; }
        .header { border-bottom: 3px solid var(--accent); margin-bottom: 12px; padding-bottom: 8px; }
        #node-label { font-weight: bold; color: var(--accent); font-size: 1em; }
        textarea { flex: 1; padding: 12px; font-size: 14px; border: 1px solid #ccc; border-radius: 6px; resize: none; outline: none; line-height: 1.5; background: #fafafa; }
        .btn-print { background: var(--accent); color: white; padding: 10px; margin-top: 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }

        /* 新增：改名輸入框樣式 */
        .rename-section { margin-bottom: 15px; }
        .rename-input { width: 100%; padding: 8px; border: 1px solid var(--accent); border-radius: 4px; font-weight: bold; box-sizing: border-box; }

        .main-view { flex: 1; overflow: auto; padding: 40px; background: white; display: flex; align-items: flex-start; }
        .tree-root { display: flex; flex-direction: column; align-items: flex-start; }
        
        .ul-tree { list-style: none; padding-left: 20px; margin: 0; position: relative; display: flex; flex-direction: column; }
        .li-node { position: relative; display: flex; align-items: center; padding: 6px 0; }

        .box { padding: 3px 8px; min-width: unset; font-size: 13px; line-height: 1.2; border: 1.5px solid var(--primary); border-radius: 4px; background: white; cursor: pointer; text-align: center; font-weight: bold; transition: 0.1s; user-select: none; white-space: nowrap; z-index: 5; }
        .box:hover { background: #fff7ed; border-color: var(--accent); }
        .box.active { border-color: var(--accent); background: #fff7ed; box-shadow: 0 0 5px rgba(230, 126, 34, 0.3); }
        .box.root-box { background: var(--primary); color: white; border-radius: 20px; padding: 10px 20px; font-size: 14px; }

        .li-node::before { content: ""; position: absolute; left: -20px; top: 50%; width: 20px; border-top: 1.5px solid var(--line); }
        .li-node::after { content: ""; position: absolute; left: -20px; width: 0; border-left: 1.5px solid var(--line); top: 0; height: 100%; }
        .li-node:first-child::after { top: 50%; height: 50%; left: -20px; }
        .li-node:last-child::after { top: 0; height: 50%; left: -20px; }
        .li-node:only-child::after { display: none; }
        .tree-root > .li-node::before, .tree-root > .li-node::after { display: none; }

        @media print { 
    .sidebar { display: none; } 
    .main-view { padding: 0; overflow: visible; width: 100%; } 
    body { background: white; } 
    * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }

    /* --- 新增：強制列印時不顯示選中狀態的橘色 --- */
    .box.active { 
        border-color: var(--primary) !important; /* 恢復成深藍/黑色邊框 */
        background: white !important;           /* 恢復成白色背景 */
        box-shadow: none !important;            /* 移除陰影 */
        color: var(--primary) !important;
    }
    
    /* 如果是根節點被選中，也要維持深藍色底 */
    .box.root-box.active {
        background-color: #2c3e50 !important;
        color: white !important;
    }
    /* -------------------------------------- */

    .box.root-box { background-color: #2c3e50 !important; color: white !important; border: none !important; }
    .box { padding: 2px 6px !important; font-size: 11px !important; border: 1px solid black !important; }
    .li-node::before, .li-node::after { border-color: black !important; }
}

        #lobby-view { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f5f6fa; z-index: 999; display: flex; flex-direction: column; align-items: center; padding-top: 50px; overflow-y: auto; }
        .lobby-container { width: 80%; max-width: 900px; }
        .project-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin-top: 30px; }
        .project-card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); cursor: pointer; border: 2px solid transparent; position: relative; text-align: center; }
        .project-card:hover { border-color: var(--accent); }
        .project-card h3 { margin: 10px 0; color: var(--primary); font-size: 16px; }
        .btn-add { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-back-home { background: #eee; border: none; padding: 5px 10px; margin-bottom: 10px; border-radius: 4px; cursor: pointer; font-size: 12px; width: fit-content; }
        .del-file { position: absolute; top: 5px; right: 5px; color: #ccc; border: none; background: none; cursor: pointer; font-size: 18px; }
        .del-file:hover { color: red; }
    </style>
</head>
<body>

<div id="login-overlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:var(--primary); z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center; color:white;">
    <h2 style="margin-bottom:20px;">SOP 系統安全驗證</h2>
    <div style="background:white; padding:30px; border-radius:12px; display:flex; flex-direction:column; gap:15px; width:300px; color: #333;">
        <h3 id="auth-title" style="margin:0; text-align:center; color:var(--primary);">登入系統</h3>
        <input type="text" id="user-id" placeholder="帳號" style="padding:10px; border:1px solid #ccc; border-radius:6px;">
        <input type="password" id="user-pw" placeholder="密碼" style="padding:10px; border:1px solid #ccc; border-radius:6px;">
        <button id="auth-btn" onclick="handleAuth()" style="background:var(--accent); color:white; border:none; padding:12px; border-radius:6px; cursor:pointer; font-weight:bold;">進入系統</button>
        <p id="login-msg" style="color:red; font-size:12px; margin:0; display:none; text-align:center;">帳號或密碼錯誤！</p>
        <p onclick="toggleAuthMode()" id="auth-switch" style="font-size:12px; color:#666; text-align:center; cursor:pointer; text-decoration:underline;">還沒有帳號？按此註冊</p>
    </div>
    <p style="margin-top:20px; font-size:12px; opacity:0.7;">提示：預設帳號 admin / 密碼 1234</p>
</div>

<div id="lobby-view" style="display: none;">
    <div class="lobby-container" style="width:80%; margin: 0 auto; padding-top: 50px;">
        <h1 style="color: var(--primary);">組裝專案大廳</h1>
        
        <div style="display: flex; gap: 10px; margin-bottom: 20px;">
            <button onclick="createNewProject()" style="background:var(--primary); color:white; border:none; padding:10px 20px; border-radius:6px; cursor:pointer; font-weight:bold;">
                + 建立新專案
            </button>

            <button onclick="logout()" style="background:#eee; border:1px solid #ccc; color:#666; padding:10px 20px; border-radius:6px; cursor:pointer; font-weight:bold;">
                登出系統
            </button>
        </div>

        <div class="project-grid" id="project-grid"></div>
    </div>
</div>

<div id="editor-view" style="display: none; width: 100%; height: 100%;">
    <div class="sidebar">
        <button onclick="backToLobby()" style="margin-bottom:10px; cursor:pointer; background:#eee; border:none; padding:5px; border-radius:4px;">← 返回大廳</button>
        <div class="header">
            <span id="node-label">主流程清單</span>
        </div>

        <div class="rename-section">
            <div style="font-size: 11px; color: var(--accent); margin-bottom: 5px;">✍️ 修改當前框框名稱：</div>
            <input type="text" id="rename-input" class="rename-input">
        </div>

        <div style="font-size: 11px; color: #999; margin-bottom: 5px;">子項目清單 (每行一個步驟)：</div>
        <textarea id="editor" placeholder="每一行會生成一個右側分支..."></textarea>
        
        <button class="btn-print" onclick="window.print()">列印 / 存為 PDF</button>
        <button class="btn-print" style="background:#2c3e50;" onclick="downloadData()">下載數據備份</button>
        <button onclick="logout()" style="background:none; border:none; color:#999; cursor:pointer; font-size:12px; margin-top:20px; text-decoration:underline;">安全登出系統</button>
    </div>
    <div class="main-view"><div id="canvas" class="tree-root"></div></div>
</div>

<script>
    // --- 帳號管理邏輯 ---
    let users = JSON.parse(localStorage.getItem('sys_users')) || { "admin": "1234" };
    let isRegisterMode = false;
    let loggedUser = sessionStorage.getItem('logged_user') || "";

    function toggleAuthMode() {
        isRegisterMode = !isRegisterMode;
        document.getElementById('auth-title').innerText = isRegisterMode ? "註冊新帳號" : "登入系統";
        document.getElementById('auth-btn').innerText = isRegisterMode ? "立即註冊" : "進入系統";
        document.getElementById('auth-switch').innerText = isRegisterMode ? "已有帳號？按此登入" : "還沒有帳號？按此註冊";
    }

    function handleAuth() {
        const id = document.getElementById('user-id').value.trim();
        const pw = document.getElementById('user-pw').value.trim();
        const msg = document.getElementById('login-msg');

        if (!id || !pw) return;

        if (isRegisterMode) {
            if (users[id]) {
                msg.innerText = "帳號已存在！";
                msg.style.display = "block";
            } else {
                users[id] = pw;
                localStorage.setItem('sys_users', JSON.stringify(users));
                alert("註冊成功！現在請登入。");
                toggleAuthMode();
            }
        } else {
            if (users[id] === pw) {
                sessionStorage.setItem('isLoggedIn', 'true');
                sessionStorage.setItem('logged_user', id);
                location.reload(); // 刷新以載入該用戶資料
            } else {
                msg.innerText = "帳號或密碼錯誤！";
                msg.style.display = "block";
            }
        }
    }

    function logout() {
        sessionStorage.clear();
        location.reload();
    }

    // --- 資料管理邏輯 (資料隔離) ---
    const blankTemplate = () => ({ "root": { name: "組裝流程", children: [] } });
    let allProjects = JSON.parse(localStorage.getItem('files_' + loggedUser)) || { "預設專案": null };
    let currentProjectName = "", treeData = {}, activeId = "root";

    const editor = document.getElementById('editor');
    const renameInput = document.getElementById('rename-input');
    const label = document.getElementById('node-label');
    const canvas = document.getElementById('canvas');

    function saveAll() {
        if (currentProjectName && loggedUser) {
            allProjects[currentProjectName] = treeData;
            localStorage.setItem('files_' + loggedUser, JSON.stringify(allProjects));
        }
    }

    // --- 介面邏輯 ---
    function renderLobby() {
        document.getElementById('project-grid').innerHTML = "";
        Object.keys(allProjects).forEach(name => {
            const card = document.createElement('div'); card.className = "project-card";
            card.innerHTML = `<button onclick="event.stopPropagation(); deleteProject('${name}')" style="position:absolute;right:5px;top:5px;border:none;background:none;cursor:pointer;color:#ccc;">×</button><h3>${name}</h3><div style="font-size:11px; color:#999;">點擊進入編輯</div>`;
            card.onclick = () => openProject(name);
            document.getElementById('project-grid').appendChild(card);
        });
    }

    function createNewProject() {
        const name = prompt("請輸入新專案名稱：");
        if (name && !allProjects[name]) {
            allProjects[name] = blankTemplate();
            saveAll(); renderLobby();
        }
    }

    function deleteProject(name) {
        if (Object.keys(allProjects).length <= 1) return alert("至少保留一個專案");
        if (confirm(`確定要刪除「${name}」嗎？`)) {
            delete allProjects[name];
            saveAll();
            renderLobby();
        }
    }

    function openProject(name) {
        currentProjectName = name;
        treeData = allProjects[name] || blankTemplate();
        document.getElementById('lobby-view').style.display = "none";
        document.getElementById('editor-view').style.display = "flex";
        selectNode("root");
    }

    function backToLobby() { saveAll(); document.getElementById('editor-view').style.display = "none"; document.getElementById('lobby-view').style.display = "flex"; renderLobby(); }

    function selectNode(id) {
        activeId = id;
        label.innerText = treeData[id].name;
        renameInput.value = treeData[id].name;
        editor.value = treeData[id].children.map(cid => treeData[cid].name).join('\n');
        canvas.innerHTML = "";
        canvas.appendChild(buildTree("root"));
        editor.focus();
    }

    renameInput.addEventListener('input', () => {
        treeData[activeId].name = renameInput.value || " ";
        label.innerText = treeData[activeId].name;
        canvas.innerHTML = "";
        canvas.appendChild(buildTree("root"));
        saveAll();
    });

    editor.addEventListener('input', () => {
        const lines = editor.value.split('\n').filter(l => l.trim() !== "");
        const oldChildren = treeData[activeId].children;
        const newIds = lines.map((line, i) => {
            if (oldChildren[i]) { treeData[oldChildren[i]].name = line; return oldChildren[i]; }
            let nid = 'id_' + Math.random().toString(36).substr(2, 9);
            treeData[nid] = { name: line, children: [] }; return nid;
        });
        treeData[activeId].children = newIds;
        canvas.innerHTML = "";
        canvas.appendChild(buildTree("root"));
        saveAll();
    });

    function buildTree(id) {
        const d = treeData[id];
        const container = document.createElement('div'); container.className = "li-node";
        const box = document.createElement('div');
        box.className = `box ${id === 'root' ? 'root-box' : ''} ${id === activeId ? 'active' : ''}`;
        box.innerText = d.name;
        box.onclick = (e) => { e.stopPropagation(); selectNode(id); };
        container.appendChild(box);
        if (d.children && d.children.length > 0) {
            const ul = document.createElement('div'); ul.className = "ul-tree";
            d.children.forEach(cid => ul.appendChild(buildTree(cid)));
            container.appendChild(ul);
        }
        return container;
    }

    function downloadData() {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(treeData));
        const downloadAnchorNode = document.createElement('a');
        downloadAnchorNode.setAttribute("href", dataStr);
        downloadAnchorNode.setAttribute("download", currentProjectName + "_backup.json");
        document.body.appendChild(downloadAnchorNode);
        downloadAnchorNode.click();
        downloadAnchorNode.remove();
    }

    // --- 啟動檢查 ---
    window.onload = function() {
        if (sessionStorage.getItem('isLoggedIn') === 'true' && loggedUser) {
            document.getElementById('login-overlay').style.display = "none";
            document.getElementById('lobby-view').style.display = "flex";
            renderLobby();
        }
    };
</script>
</body>
</html>

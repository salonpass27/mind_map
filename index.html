<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOP Pro - 智慧心智圖系統</title>
    <style>
        :root { --primary: #2c3e50; --accent: #e67e22; --line: #bdc3c7; --bg: #f5f6fa; }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; font-family: "Microsoft JhengHei", sans-serif; display: flex; height: 100vh; background: var(--bg); overflow: hidden; flex-direction: row; }

        /* --- 手機版佈局：上圖下文 --- */
        @media (max-width: 768px) {
            body { flex-direction: column-reverse; overflow-y: auto; }
            .sidebar { 
                width: 100% !important; 
                height: auto !important; 
                border-right: none !important; 
                border-top: 3px solid var(--accent); 
                padding: 15px !important;
                flex-shrink: 0;
                background: #fff;
            }
            .main-view { 
                height: 45vh; 
                width: 100%;
                padding: 15px !important;
                background: #fff;
            }
            .project-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)) !important; }
            .btn-group { flex-direction: row !important; }
        }

        /* 側邊編輯區 */
        .sidebar { width: 340px; background: white; border-right: 1px solid #ddd; display: flex; flex-direction: column; padding: 20px; box-shadow: 2px 0 10px rgba(0,0,0,0.05); z-index: 100; flex-shrink: 0; }
        .header { border-bottom: 3px solid var(--accent); margin-bottom: 15px; padding-bottom: 10px; }
        #node-label { font-weight: bold; color: var(--accent); font-size: 1.1em; display: block; }
        
        .edit-box { margin-bottom: 15px; }
        .label-hint { font-size: 11px; color: #888; margin-bottom: 5px; }
        .rename-input { width: 100%; padding: 12px; border: 1.5px solid #ddd; border-radius: 8px; font-weight: bold; font-size: 16px; outline: none; transition: 0.2s; }
        .rename-input:focus { border-color: var(--accent); }

        textarea { flex: 1; padding: 12px; font-size: 15px; border: 1.5px solid #ddd; border-radius: 8px; resize: none; outline: none; line-height: 1.6; background: #fafafa; min-height: 140px; }
        textarea:focus { border-color: var(--primary); background: #fff; }

        .btn-group { display: flex; flex-direction: column; gap: 8px; margin-top: 15px; }
        .btn { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 14px; transition: 0.2s; text-align: center; }
        .btn-main { background: var(--accent); color: white; }
        .btn-sub { background: var(--primary); color: white; }
        .btn-outline { background: none; border: 1px solid #ddd; color: #666; }

        /* 畫圖呈現區 */
        .main-view { flex: 1; overflow: auto; padding: 50px; background: white; display: flex; align-items: flex-start; scroll-behavior: smooth; }
        .tree-root { display: flex; flex-direction: column; align-items: flex-start; min-width: max-content; }
        .ul-tree { list-style: none; padding-left: 30px; margin: 0; position: relative; display: flex; flex-direction: column; }
        .li-node { position: relative; display: flex; align-items: center; padding: 10px 0; }

        /* 節點樣式 */
        .box { padding: 6px 14px; min-width: 80px; font-size: 14px; border: 2px solid var(--primary); border-radius: 6px; background: white; cursor: pointer; text-align: center; font-weight: bold; transition: 0.2s; white-space: nowrap; z-index: 5; color: var(--primary); }
        .box.active { border-color: var(--accent); background: #fff7ed; transform: scale(1.05); box-shadow: 0 4px 10px rgba(230, 126, 34, 0.2); }
        .box.root-box { background: var(--primary); color: white; border-radius: 30px; padding: 12px 28px; font-size: 16px; border: none; }

        /* 連線樣式 */
        .li-node::before { content: ""; position: absolute; left: -30px; top: 50%; width: 30px; border-top: 2px solid var(--line); }
        .li-node::after { content: ""; position: absolute; left: -30px; width: 0; border-left: 2px solid var(--line); top: 0; height: 100%; }
        .li-node:first-child::after { top: 50%; height: 50%; left: -30px; }
        .li-node:last-child::after { top: 0; height: 50%; left: -30px; }
        .li-node:only-child::after { display: none; }
        .tree-root > .li-node::before, .tree-root > .li-node::after { display: none; }

        /* PDF 列印優化 */
        @media print { 
            .sidebar { display: none !important; } 
            .main-view { padding: 0; overflow: visible; width: 100%; display: block; height: auto !important; } 
            body { background: white; display: block; height: auto; }
            .box { border-width: 1px !important; font-size: 12px !important; padding: 4px 8px !important; color: black !important; border-color: black !important; }
            .box.active { background: white !important; transform: none !important; box-shadow: none !important; }
            .box.root-box { background-color: #2c3e50 !important; color: white !important; -webkit-print-color-adjust: exact; }
            .li-node::before, .li-node::after { border-color: #000 !important; }
        }

        /* 登入與大廳 */
        #login-screen, #lobby-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1000; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: white; padding: 35px; border-radius: 15px; width: 100%; max-width: 350px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .project-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 15px; width: 100%; max-width: 900px; margin-top: 25px; }
        .card { background: white; padding: 25px; border-radius: 12px; text-align: center; cursor: pointer; position: relative; border: 2px solid transparent; transition: 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.03); }
        .card:hover { border-color: var(--accent); transform: translateY(-3px); }
        .btn-del { position: absolute; top: 8px; right: 8px; color: #ccc; border: none; background: none; font-size: 20px; cursor: pointer; }
        .btn-del:hover { color: red; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="auth-card">
        <h2 id="auth-title" style="text-align:center; color:var(--primary); margin-top:0;">系統驗證</h2>
        <input type="text" id="user-id" class="rename-input" placeholder="帳號" style="margin-bottom:15px;">
        <input type="password" id="user-pw" class="rename-input" placeholder="密碼" style="margin-bottom:15px;">
        <button class="btn btn-main" style="width:100%" onclick="handleAuth()">進入系統</button>
        <p onclick="toggleAuthMode()" id="auth-switch" style="text-align:center; font-size:13px; color:#666; cursor:pointer; margin-top:15px; text-decoration:underline;">還沒有帳號？按此註冊</p>
    </div>
</div>

<div id="lobby-screen" style="display:none; justify-content: flex-start; overflow-y: auto;">
    <div style="width:100%; max-width:900px; margin-top: 40px;">
        <h1 style="color: var(--primary); margin-bottom: 5px;">我的組裝專案</h1>
        <div style="display: flex; gap: 10px; margin-bottom: 25px;">
            <button class="btn btn-sub" onclick="createNewProject()">+ 建立新專案</button>
            <button class="btn btn-outline" onclick="logout()">安全登出</button>
        </div>
        <div id="project-grid" class="project-grid"></div>
    </div>
</div>

<div id="editor-view" style="display:none; width: 100%; height: 100%;">
    <div class="sidebar">
        <button class="btn btn-outline" style="margin-bottom:15px; align-self: flex-start;" onclick="backToLobby()">← 返回大廳</button>
        <div class="header">
            <span id="node-label">節點名稱</span>
        </div>
        
        <div class="edit-box">
            <div class="label-hint">✍️ 修改名稱：</div>
            <input type="text" id="rename-input" class="rename-input">
        </div>

        <div class="label-hint">📂 下一層子項目 (每行一個)：</div>
        <textarea id="editor" placeholder="在此輸入步驟內容..."></textarea>
        
        <div class="btn-group">
            <button class="btn btn-main" onclick="window.print()">列印 / 存為 PDF</button>
            <button class="btn btn-outline" style="font-size: 12px;" onclick="logout()">切換帳號登出</button>
        </div>
    </div>
    <div class="main-view">
        <div id="canvas" class="tree-root"></div>
    </div>
</div>

<script>
    // --- 帳號與存儲邏輯 ---
    let users = JSON.parse(localStorage.getItem('sop_users')) || { "admin": "1234" };
    let loggedUser = sessionStorage.getItem('sop_logged_user') || "";
    let isRegisterMode = false;

    function handleAuth() {
        const id = document.getElementById('user-id').value.trim();
        const pw = document.getElementById('user-pw').value.trim();
        if (!id || !pw) return;

        if (isRegisterMode) {
            if (users[id]) return alert("帳號已存在");
            users[id] = pw;
            localStorage.setItem('sop_users', JSON.stringify(users));
            alert("註冊成功，請登入");
            toggleAuthMode();
        } else {
            if (users[id] === pw) {
                sessionStorage.setItem('sop_logged_user', id);
                location.reload();
            } else { alert("帳密錯誤"); }
        }
    }

    function toggleAuthMode() {
        isRegisterMode = !isRegisterMode;
        document.getElementById('auth-title').innerText = isRegisterMode ? "註冊新帳號" : "系統驗證";
        document.getElementById('auth-switch').innerText = isRegisterMode ? "已有帳號？按此登入" : "還沒有帳號？按此註冊";
    }

    function logout() { sessionStorage.clear(); location.reload(); }

    // --- 專案資料邏輯 ---
    const storageKey = 'sop_data_' + loggedUser;
    let allProjects = JSON.parse(localStorage.getItem(storageKey)) || { "預設組裝專案": { "root": { name: "組裝流程主標題", children: [] } } };
    let currentProjectName = "", treeData = {}, activeId = "root";

    const editor = document.getElementById('editor');
    const renameInput = document.getElementById('rename-input');
    const canvas = document.getElementById('canvas');

    function save() { if (currentProjectName) { allProjects[currentProjectName] = treeData; localStorage.setItem(storageKey, JSON.stringify(allProjects)); } }

    function renderLobby() {
        const grid = document.getElementById('project-grid');
        grid.innerHTML = "";
        Object.keys(allProjects).forEach(name => {
            const card = document.createElement('div');
            card.className = "card";
            card.innerHTML = `<button class="btn-del" onclick="event.stopPropagation(); deleteProject('${name}')">×</button><h3 style="margin:0; font-size:16px;">${name}</h3>`;
            card.onclick = () => openProject(name);
            grid.appendChild(card);
        });
    }

    function createNewProject() {
        const name = prompt("請輸入專案名稱：");
        if (name && !allProjects[name]) {
            allProjects[name] = { "root": { name: name, children: [] } };
            save(); renderLobby();
        }
    }

    function deleteProject(name) {
        if (confirm(`確定刪除「${name}」？`)) { delete allProjects[name]; save(); renderLobby(); }
    }

    function openProject(name) {
        currentProjectName = name;
        treeData = allProjects[name];
        document.getElementById('lobby-screen').style.display = "none";
        document.getElementById('editor-view').style.display = "flex";
        selectNode("root");
    }

    function backToLobby() { save(); document.getElementById('editor-view').style.display = "none"; document.getElementById('lobby-screen').style.display = "flex"; renderLobby(); }

    // --- 心智圖編輯核心 ---
    function selectNode(id) {
        activeId = id;
        document.getElementById('node-label').innerText = treeData[id].name;
        renameInput.value = treeData[id].name;
        editor.value = treeData[id].children.map(cid => treeData[cid].name).join('\n');
        renderTree();
    }

    renameInput.addEventListener('input', () => {
        treeData[activeId].name = renameInput.value || " ";
        document.getElementById('node-label').innerText = renameInput.value;
        renderTree();
        save();
    });

    editor.addEventListener('input', () => {
        const lines = editor.value.split('\n').filter(l => l.trim() !== "");
        const oldChildren = treeData[activeId].children;
        const newIds = lines.map((line, i) => {
            if (oldChildren[i]) { treeData[oldChildren[i]].name = line; return oldChildren[i]; }
            let nid = 'n_' + Math.random().toString(36).substr(2, 9);
            treeData[nid] = { name: line, children: [] }; return nid;
        });
        treeData[activeId].children = newIds;
        renderTree();
        save();
    });

    function buildTreeHTML(id) {
        const data = treeData[id];
        const container = document.createElement('div');
        container.className = "li-node";
        
        const box = document.createElement('div');
        box.className = `box ${id === 'root' ? 'root-box' : ''} ${id === activeId ? 'active' : ''}`;
        box.innerText = data.name;
        box.onclick = (e) => { e.stopPropagation(); selectNode(id); };
        
        container.appendChild(box);
        
        if (data.children && data.children.length > 0) {
            const ul = document.createElement('div');
            ul.className = "ul-tree";
            data.children.forEach(cid => ul.appendChild(buildTreeHTML(cid)));
            container.appendChild(ul);
        }
        return container;
    }

    function renderTree() {
        canvas.innerHTML = "";
        canvas.appendChild(buildTreeHTML("root"));
    }

    // --- 初始化檢查 ---
    window.onload = function() {
        if (loggedUser) {
            document.getElementById('login-screen').style.display = "none";
            document.getElementById('lobby-screen').style.display = "flex";
            renderLobby();
        }
    };
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOP 組裝系統 - 終極適配版</title>
    <style>
        :root { --primary: #2c3e50; --accent: #e67e22; --bg: #f8f9fa; }
        * { box-sizing: border-box; }
        body { margin: 0; font-family: sans-serif; background: var(--bg); height: 100vh; overflow: hidden; }

        /* --- 響應式佈局主架構 --- */
        #editor-view { display: flex; height: 100vh; width: 100%; }
        
        /* 電腦版：左側工具欄 320px */
        .sidebar { width: 340px; background: white; border-right: 1px solid #ddd; display: flex; flex-direction: column; padding: 20px; z-index: 100; box-shadow: 2px 0 10px rgba(0,0,0,0.05); }
        .main-view { flex: 1; background: white; overflow: auto; display: flex; align-items: flex-start; padding: 40px; }

        /* --- 手機版 (徹底打掉重做) --- */
        @media (max-width: 768px) {
            #editor-view { flex-direction: column-reverse; } /* 下方編輯，上方看圖 */
            .sidebar { 
                width: 100% !important; 
                height: 40vh !important; 
                border-right: none !important; 
                border-top: 3px solid var(--accent); 
                padding: 15px !important;
            }
            .main-view { 
                height: 60vh; 
                padding: 15px !important;
                /* 手機版改為垂直列表模式，避免左右滑動麻煩 */
            }
            .li-node { flex-direction: column !important; align-items: flex-start !important; }
            .ul-tree { padding-left: 20px !important; }
            .li-node::before, .li-node::after { left: -15px !important; }
        }

        /* 編輯元件 */
        .header { border-bottom: 3px solid var(--accent); margin-bottom: 15px; padding-bottom: 10px; font-weight: bold; color: var(--accent); }
        .input-group { margin-bottom: 15px; }
        .label { font-size: 12px; color: #888; margin-bottom: 5px; }
        .input-text { width: 100%; padding: 12px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 16px; font-weight: bold; }
        textarea { width: 100%; flex: 1; padding: 12px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 15px; resize: none; background: #fafafa; }

        /* 心智圖節點樣式 */
        .tree-root { display: flex; flex-direction: column; align-items: flex-start; min-width: max-content; }
        .ul-tree { list-style: none; padding-left: 30px; margin: 0; position: relative; }
        .li-node { position: relative; display: flex; align-items: center; padding: 8px 0; }
        .box { 
            padding: 8px 15px; border: 2px solid var(--primary); border-radius: 6px; 
            background: white; cursor: pointer; font-weight: bold; white-space: nowrap; 
            transition: 0.2s; font-size: 14px; 
        }
        .box.active { border-color: var(--accent); background: #fff7ed; transform: scale(1.05); }
        .box.root-box { background: var(--primary); color: white; border-radius: 20px; padding: 12px 25px; }

        /* 連線 */
        .li-node::before { content: ""; position: absolute; left: -30px; top: 50%; width: 30px; border-top: 2px solid #ccc; }
        .li-node::after { content: ""; position: absolute; left: -30px; width: 0; border-left: 2px solid #ccc; top: 0; height: 100%; }
        .li-node:first-child::after { top: 50%; height: 50%; }
        .li-node:last-child::after { height: 50%; }
        .li-node:only-child::after { display: none; }

        /* 登入與大廳卡片樣式 */
        #login-screen, #lobby-screen { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 12px; width: 100%; max-width: 350px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-outline { background: none; border: 1px solid #ddd; color: #666; }

        .project-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; width: 100%; max-width: 800px; margin-top: 20px; }
        .project-item { background: white; padding: 20px; border-radius: 10px; text-align: center; cursor: pointer; position: relative; border: 2px solid transparent; }
        .project-item:hover { border-color: var(--accent); }

        @media print { .sidebar { display: none; } .main-view { overflow: visible; height: auto; } .box.active { background: white !important; } }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="card">
        <h2 style="text-align:center; margin-top:0;">SOP 安全登入</h2>
        <input type="text" id="user-id" class="input-text" placeholder="帳號" style="margin-bottom:10px;">
        <input type="password" id="user-pw" class="input-text" placeholder="密碼">
        <button class="btn btn-primary" onclick="handleAuth()">進入系統</button>
        <p onclick="toggleReg()" id="reg-toggle" style="text-align:center; font-size:12px; color:#666; cursor:pointer; margin-top:15px; text-decoration:underline;">註冊新帳號</p>
    </div>
</div>

<div id="lobby-screen" style="display:none; justify-content: flex-start; overflow-y: auto;">
    <h1 style="color: var(--primary); margin-top: 40px;">專案大廳</h1>
    <div style="display: flex; gap: 10px;">
        <button class="btn btn-primary" style="width:auto; padding: 10px 20px;" onclick="addProj()">+ 新建專案</button>
        <button class="btn btn-outline" style="width:auto; padding: 10px 20px;" onclick="logout()">登出</button>
    </div>
    <div id="proj-list" class="project-grid"></div>
</div>

<div id="editor-view" style="display:none;">
    <div class="sidebar">
        <button class="btn btn-outline" onclick="goHome()" style="margin-bottom:15px; width:fit-content;">← 返回</button>
        <div class="header" id="header-name">節點名稱</div>
        
        <div class="input-group">
            <div class="label">修改此項名稱：</div>
            <input type="text" id="rename-box" class="input-text">
        </div>
        
        <div class="label">子項目清單 (每行一個)：</div>
        <textarea id="children-box"></textarea>
        
        <button class="btn btn-primary" onclick="window.print()">列印 / 存為 PDF</button>
    </div>
    
    <div class="main-view">
        <div id="tree-canvas" class="tree-root"></div>
    </div>
</div>

<script>
    let users = JSON.parse(localStorage.getItem('sop_u')) || { "admin": "1234" };
    let logged = sessionStorage.getItem('sop_l') || "";
    let isReg = false;

    function handleAuth() {
        const u = document.getElementById('user-id').value.trim();
        const p = document.getElementById('user-pw').value.trim();
        if(!u || !p) return;
        if(isReg) { users[u] = p; localStorage.setItem('sop_u', JSON.stringify(users)); alert("註冊成功"); toggleReg(); }
        else { if(users[u] === p) { sessionStorage.setItem('sop_l', u); location.reload(); } else alert("錯誤"); }
    }
    function toggleReg() { isReg = !isReg; document.getElementById('reg-toggle').innerText = isReg ? "返回登入" : "註冊新帳號"; }
    function logout() { sessionStorage.clear(); location.reload(); }

    const storageKey = "sop_data_" + logged;
    let projs = JSON.parse(localStorage.getItem(storageKey)) || { "範例專案": { root: { name: "主流程", children: [] } } };
    let curName = "", curData = {}, activeId = "root";

    function renderProj() {
        const list = document.getElementById('proj-list');
        list.innerHTML = "";
        Object.keys(projs).forEach(n => {
            const div = document.createElement('div');
            div.className = "project-item";
            div.innerHTML = `<h3>${n}</h3><button onclick="event.stopPropagation(); delProj('${n}')" style="border:none; background:none; color:red; cursor:pointer;">刪除</button>`;
            div.onclick = () => { curName = n; curData = projs[n]; document.getElementById('lobby-screen').style.display="none"; document.getElementById('editor-view').style.display="flex"; selectNode("root"); };
            list.appendChild(div);
        });
    }

    function addProj() { const n = prompt("名稱?"); if(n) { projs[n] = { root: { name: n, children: [] } }; save(); renderProj(); } }
    function delProj(n) { if(confirm("刪?")) { delete projs[n]; save(); renderProj(); } }
    function save() { if(curName) { projs[curName] = curData; localStorage.setItem(storageKey, JSON.stringify(projs)); } }
    function goHome() { save(); document.getElementById('editor-view').style.display="none"; document.getElementById('lobby-screen').style.display="flex"; renderProj(); }

    function selectNode(id) {
        activeId = id;
        const n = curData[id];
        document.getElementById('header-name').innerText = n.name;
        document.getElementById('rename-box').value = n.name;
        document.getElementById('children-box').value = n.children.map(c => curData[c].name).join('\n');
        renderTree();
    }

    document.getElementById('rename-box').addEventListener('input', (e) => {
        curData[activeId].name = e.target.value || " ";
        document.getElementById('header-name').innerText = e.target.value;
        renderTree(); save();
    });

    document.getElementById('children-box').addEventListener('input', (e) => {
        const lines = e.target.value.split('\n').filter(l => l.trim() !== "");
        const old = curData[activeId].children;
        const nextIds = lines.map((l, i) => {
            if(old[i]) { curData[old[i]].name = l; return old[i]; }
            const nid = 'id_' + Math.random().toString(36).substr(2, 9);
            curData[nid] = { name: l, children: [] }; return nid;
        });
        curData[activeId].children = nextIds;
        renderTree(); save();
    });

    function buildNode(id) {
        const node = curData[id];
        const wrap = document.createElement('div'); wrap.className = "li-node";
        const box = document.createElement('div');
        box.className = `box ${id === 'root' ? 'root-box' : ''} ${id === activeId ? 'active' : ''}`;
        box.innerText = node.name;
        box.onclick = (e) => { e.stopPropagation(); selectNode(id); };
        wrap.appendChild(box);
        if(node.children.length > 0) {
            const ul = document.createElement('div'); ul.className = "ul-tree";
            node.children.forEach(cid => ul.appendChild(buildNode(cid)));
            wrap.appendChild(ul);
        }
        return wrap;
    }

    function renderTree() { const c = document.getElementById('tree-canvas'); c.innerHTML = ""; c.appendChild(buildNode("root")); }

    window.onload = () => {
        if(logged) { document.getElementById('login-screen').style.display="none"; document.getElementById('lobby-screen').style.display="flex"; renderProj(); }
    };
</script>

</body>
</html>
